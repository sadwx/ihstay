name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "openspec/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "openspec/**"
      - ".gitignore"
      - "LICENSE"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check --all

  clippy:
    name: cargo clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS-latest is billed at 10x on private repos. PRs run Windows-only;
        # the macOS safety net runs once per push to main (post-merge). A real
        # macOS regression surfaces at merge instead of at PR review, but the
        # effective-minute saving per PR is ~80%.
        os: ${{ github.event_name == 'push' && fromJSON('["macos-latest", "windows-latest"]') || fromJSON('["windows-latest"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["macos-latest", "windows-latest"]') || fromJSON('["windows-latest"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-fail-fast

  hook-test:
    name: pending_hook.ps1 regression test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hook regression test
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/test-hook.ps1
